name: Deploy CodeShield Frontend

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "${{ secrets.ROLE_ARN }}"
          aws-region: eu-west-2

      - name: Sync frontend files to S3
        run: aws s3 sync . s3://faiez-codeshield --exclude "terraform/*" --exclude ".git/*" --exclude ".github/*"

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E3DGVUZSCSV6YW --paths "/*"